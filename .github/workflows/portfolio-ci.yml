name: portfolio-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run build
      - run: bun audit --audit-level=critical
        env:
          BUN_CONFIG_REGISTRY: https://registry.npmjs.org
      - run: bun run portfolio:scan
      - run: bun run release:prepare
      - run: bunx wrangler deploy --dry-run --config dist/server/wrangler.json

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
